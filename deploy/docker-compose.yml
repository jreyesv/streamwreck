# streamwreck lab topology (spec §4.1). The whole point of containerizing is
# network-namespace isolation: shaping happens inside a container's netns on its
# veth, so it can never touch the host or other containers (§4.2#2).
#
# Sidecars share their target's netns via network_mode: "service:<target>", so
# `tc ... dev eth0` inside a sidecar impairs the target's interface while the
# target image stays clean and unprivileged (§4.2#1).

name: streamwreck

services:
  # MediaMTX: RTMP+SRT in → HLS/DASH out. Ingest and playback origin in one.
  ingest:
    image: bluenviron/mediamtx:latest
    container_name: streamwreck-ingest
    hostname: ingest
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "1935:1935"   # RTMP
      - "8890:8890/udp" # SRT
      - "8888:8888"   # HLS
      - "8889:8889"   # DASH/WebRTC
    networks:
      - lab

  # Encoder: ffmpeg only. NO capabilities, no shaping tools. Idle entrypoint so
  # the host controller can `docker compose exec encoder ffmpeg ...` on demand.
  encoder:
    build: ./encoder
    container_name: streamwreck-encoder
    hostname: encoder
    command: ["sleep", "infinity"]
    volumes:
      # Drop your own videos in ./media (repo root) and reference them from a
      # scenario as `source: { type: file, file: /media/<name> }`.
      - ../media:/media:ro
    depends_on:
      - ingest
    networks:
      - lab

  # Shaper sidecar: shares the encoder's netns, holds NET_ADMIN + iproute2 +
  # threefive. This is the ONLY container that can shape the encoder uplink.
  shaper:
    build: ./shaper
    container_name: streamwreck-shaper
    network_mode: "service:encoder"
    cap_add:
      - NET_ADMIN
    command: ["sleep", "infinity"]
    depends_on:
      - encoder

  # Player: ffmpeg + curl, pulls HLS/DASH for verification. Clean, no caps.
  player:
    build: ./encoder
    container_name: streamwreck-player
    hostname: player
    command: ["sleep", "infinity"]
    depends_on:
      - ingest
    networks:
      - lab

  # Player-shaper sidecar: shares the player's netns, NET_ADMIN + iproute2, sets
  # up the IFB ingress redirect to impair the DOWNLOAD path (§4.2#3).
  player-shaper:
    build: ./shaper
    container_name: streamwreck-player-shaper
    network_mode: "service:player"
    cap_add:
      - NET_ADMIN
    command: ["sleep", "infinity"]
    depends_on:
      - player

networks:
  lab:
    driver: bridge
