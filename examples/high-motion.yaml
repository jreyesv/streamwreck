# High-motion gameplay: high-entropy VBR content that forces the bitrate to
# climb into a modest uplink cap — variable segment sizes, ABR noise, and
# VBV/buffer stress from a tight bufsize against a high maxrate.
#
# Copy into presets/user/, set output.url + verify.pull, run against STAGING.
name: high-motion

source:
  type: complex
  complexity: high
  resolution: 1920x1080
  fps: 60
  timecode_overlay: true

encoder:
  video_bitrate: 8M
  maxrate: 9M # headroom for content spikes
  bufsize: 4M # tight bufsize → VBV/buffer stress
  gop: 120 # 120 / 60fps = 2s keyframe interval
  keyint_min: 120
  preset: veryfast
  tune: zerolatency
  audio_bitrate: 160k

output:
  protocol: rtmp
  url: rtmp://ingest.yourplatform.com/app/STREAMKEY

timeline:
  - at: 0s
    network: { rate: 6000kbit, accurate: true } # modest cap the VBR bursts collide with

verify:
  enabled: true
  pull: https://play.yourplatform.com/CHANNEL/index.m3u8
  checks: [rebuffering, segment_duration, join_time]
  report: ./reports/high-motion.json
