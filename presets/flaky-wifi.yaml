name: flaky-wifi
description: Variable delay + jitter with periodic loss bursts on the encoder uplink.

source:
  type: testsrc2
  resolution: 1280x720
  fps: 30
  timecode_overlay: true

encoder:
  video_bitrate: 3M
  maxrate: 3M
  bufsize: 6M
  gop: 60
  keyint_min: 60
  preset: veryfast
  tune: zerolatency
  audio_bitrate: 128k

output:
  protocol: rtmp
  url: rtmp://ingest/live/stream

timeline:
  - at: 0s
    network: { delay: 40ms, jitter: 10ms, loss: 0.5% }
  - at: 30s
    network: { delay: 200ms, jitter: 80ms, loss: 15%, rate: 800kbit }
  - at: 60s
    network: clear
  - at: 90s
    network: { delay: 120ms, jitter: 40ms, loss: 5% }
  - at: 120s
    network: clear

verify:
  enabled: true
  pull: http://ingest:8888/live/stream/index.m3u8
  checks:
    - segment_duration
    - join_time
    - rebuffering
  report: ./reports/flaky-wifi.json
