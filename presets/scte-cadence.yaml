name: scte-cadence
description: Well-formed SCTE-35 on a fixed cadence — marker pass-through fidelity.

source:
  type: testsrc2
  resolution: 1280x720
  fps: 30
  timecode_overlay: true

encoder:
  video_bitrate: 3M
  maxrate: 3M
  bufsize: 6M
  gop: 60
  keyint_min: 60
  preset: veryfast
  tune: zerolatency
  audio_bitrate: 128k

# SCTE-35 requires an mpegts-capable transport; FLV/RTMP cannot carry it.
output:
  protocol: srt
  url: srt://ingest:8890?streamid=publish:live/stream

timeline: []

scte35:
  enabled: true
  type: time_signal
  cadence: 30s
  preroll: 4s
  break_duration: 30s
  misalign: false

verify:
  enabled: true
  pull: http://ingest:8888/live/stream/index.m3u8
  checks:
    - scte_markers
    - segment_duration
    - join_time
  report: ./reports/scte-cadence.json
