name: ad-boundary-mismatch
description: Splices an ad encoded to a different bitrate/resolution/GOP profile than the
  program — reproduces the visible quality step or stall at the content↔ad transition.

source:
  type: testsrc2
  resolution: 1280x720
  fps: 30
  timecode_overlay: true

encoder:
  video_bitrate: 3M
  maxrate: 3M
  bufsize: 6M
  gop: 60
  keyint_min: 60
  preset: veryfast
  tune: zerolatency
  audio_bitrate: 128k

output:
  protocol: srt
  url: srt://ingest:8890?streamid=publish:live/stream

timeline: []

scte35:
  enabled: true
  type: splice_insert
  cadence: 30s
  preroll: 4s
  break_duration: 30s
  misalign: false

# Ad profile deliberately mismatched from the program (double bitrate, different
# ladder rung and keyframe cadence) to reproduce the boundary quality step.
ad:
  enabled: true
  source: { type: complex, complexity: medium }
  encoder:
    video_bitrate: 6M
    resolution: 1920x1080
    gop: 90
  duration: 30s

verify:
  enabled: true
  pull: http://ingest:8888/live/stream/index.m3u8
  checks:
    - scte_markers
    - segment_duration
    - rebuffering
  report: ./reports/ad-boundary-mismatch.json
