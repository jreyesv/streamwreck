name: splice-misalign
description: SCTE-35 splice points deliberately off GOP boundaries — ad-transition breakage.

source:
  type: testsrc2
  resolution: 1280x720
  fps: 30
  timecode_overlay: true

encoder:
  video_bitrate: 3M
  maxrate: 3M
  bufsize: 6M
  gop: 60
  keyint_min: 60
  preset: veryfast
  tune: zerolatency
  audio_bitrate: 128k

output:
  protocol: srt
  url: srt://ingest:8890?streamid=publish:live/stream

timeline:
  - at: 45s
    action: keyframe_misalign

scte35:
  enabled: true
  type: time_signal
  cadence: 30s
  preroll: 4s
  break_duration: 30s
  misalign: true

verify:
  enabled: true
  pull: http://ingest:8888/live/stream/index.m3u8
  checks:
    - scte_markers
    - segment_duration
    - discontinuity_tags
  report: ./reports/splice-misalign.json
