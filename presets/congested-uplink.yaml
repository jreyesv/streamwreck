name: congested-uplink
description: Periodic rate collapse (htb-backed) — encoder starvation.

source:
  type: testsrc2
  resolution: 1280x720
  fps: 30
  timecode_overlay: true

encoder:
  video_bitrate: 3M
  maxrate: 3M
  bufsize: 6M
  gop: 60
  keyint_min: 60
  preset: veryfast
  tune: zerolatency
  audio_bitrate: 128k

output:
  protocol: rtmp
  url: rtmp://ingest/live/stream

timeline:
  - at: 0s
    network: clear
  - at: 20s
    network: { rate: 700kbit, accurate: true }
  - at: 40s
    network: clear
  - at: 60s
    network: { rate: 500kbit, accurate: true }
  - at: 80s
    network: clear

verify:
  enabled: true
  pull: http://ingest:8888/live/stream/index.m3u8
  checks:
    - segment_duration
    - rebuffering
    - join_time
  report: ./reports/congested-uplink.json
