name: pts-jump
description: Timestamp discontinuities — player/packager PTS handling.

source:
  type: testsrc2
  resolution: 1280x720
  fps: 30
  timecode_overlay: true

encoder:
  video_bitrate: 3M
  maxrate: 3M
  bufsize: 6M
  gop: 60
  keyint_min: 60
  preset: veryfast
  tune: zerolatency
  audio_bitrate: 128k

output:
  protocol: rtmp
  url: rtmp://ingest/live/stream

timeline:
  - at: 40s
    action: pts_jump
    params: { jump: 5s }

verify:
  enabled: true
  pull: http://ingest:8888/live/stream/index.m3u8
  checks:
    - discontinuity_tags
    - segment_duration
  report: ./reports/pts-jump.json
